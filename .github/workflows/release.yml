name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: 1.26.x

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Validate stable semantic version tag
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Expected a stable vMAJOR.MINOR.PATCH tag, got $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run release checks
        run: make ci
      - name: Install Syft
        run: go install github.com/anchore/syft/cmd/syft@v1.44.0
      - name: Publish GitHub Release and Homebrew formula
        uses: goreleaser/goreleaser-action@4c6ab561adb47e50c45ef534e2155934e91c40c1 # v7.2.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
      - name: Attest release archives and SBOMs
        uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4 # v4.0.0
        with:
          subject-checksums: dist/checksums.txt
      - name: Attest checksum manifest
        uses: actions/attest@c32b4b8b198b65d0bd9d63490e847ff7b53989d4 # v4.0.0
        with:
          subject-path: dist/checksums.txt

  smoke-archives:
    name: Smoke archive (${{ matrix.name }})
    needs: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AMD64
            runner: ubuntu-24.04
            platform: Linux
            arch: x86_64
            suffix: tar.gz
            binary: cxre
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            platform: Linux
            arch: arm64
            suffix: tar.gz
            binary: cxre
          - name: macOS Intel
            runner: macos-15-intel
            platform: Darwin
            arch: x86_64
            suffix: tar.gz
            binary: cxre
          - name: macOS Apple Silicon
            runner: macos-15
            platform: Darwin
            arch: arm64
            suffix: tar.gz
            binary: cxre
          - name: Windows AMD64
            runner: windows-2025
            platform: Windows
            arch: x86_64
            suffix: zip
            binary: cxre.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Download, extract, and run release archive
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $archive = "cxre_${version}_${{ matrix.platform }}_${{ matrix.arch }}.${{ matrix.suffix }}"
          gh release download $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --pattern $archive
          if ($LASTEXITCODE -ne 0) { throw "Unable to download $archive" }

          New-Item -ItemType Directory -Path extracted | Out-Null
          if ($archive.EndsWith(".zip")) {
            Expand-Archive -Path $archive -DestinationPath extracted
          } else {
            tar -xzf $archive -C extracted
            if ($LASTEXITCODE -ne 0) { throw "Unable to extract $archive" }
          }

          $binary = Join-Path (Resolve-Path extracted) "${{ matrix.binary }}"
          & $binary --help
          if ($LASTEXITCODE -ne 0) { throw "$binary --help failed" }
          & $binary --version
          if ($LASTEXITCODE -ne 0) { throw "$binary --version failed" }
