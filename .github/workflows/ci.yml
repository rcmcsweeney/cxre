name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.x

jobs:
  quality:
    name: Format, vet, and test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run checks
        run: make check

  race:
    name: Race detector
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test with race detector
        run: make test-race

  vulnerabilities:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Scan dependencies and reachable code
        run: make vulncheck

  smoke:
    name: Smoke test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build native executable
        shell: bash
        run: >-
          go build -trimpath
          -ldflags="-s -w
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.Version=ci
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.Commit=${{ github.sha }}
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.BuildDate=ci"
          -o cxre${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/cxre
      - name: Smoke test help and version
        shell: bash
        run: |
          ./cxre${{ runner.os == 'Windows' && '.exe' || '' }} --help
          ./cxre${{ runner.os == 'Windows' && '.exe' || '' }} --version

  snapshot:
    name: Release snapshot
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install Syft
        run: go install github.com/anchore/syft/cmd/syft@v1.44.0
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@4c6ab561adb47e50c45ef534e2155934e91c40c1 # v7.2.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cxre-snapshot
          path: dist/
          if-no-files-found: error
          retention-days: 7
