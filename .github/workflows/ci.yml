name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.x
  MIN_GO_VERSION: 1.25.x

jobs:
  quality:
    name: Format, vet, and test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run checks
        run: make check

  minimum-go:
    name: Go 1.25 compatibility
    runs-on: ubuntu-24.04
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.MIN_GO_VERSION }}
          cache: true
      - name: Verify minimum toolchain
        shell: bash
        run: |
          go env GOVERSION | grep -Eq '^go1\.25(\.|$)'
      - name: Check compatibility
        run: |
          go mod tidy -diff
          go vet ./...
          go test -count=1 ./...
          go build -trimpath -o cxre-minimum-go ./cmd/cxre

  race:
    name: Race detector
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Test with race detector
        run: make test-race

  vulnerabilities:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Scan dependencies and reachable code
        run: make vulncheck

  smoke:
    name: Smoke test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run native tests
        run: go test -count=1 -timeout=2m ./...
      - name: Build native executable
        shell: bash
        run: >-
          go build -trimpath
          -ldflags="-s -w
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.Version=ci
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.Commit=${{ github.sha }}
          -X github.com/rcmcsweeney/cxre/internal/buildinfo.BuildDate=ci"
          -o cxre${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/cxre
      - name: Smoke test help and version
        shell: bash
        run: |
          ./cxre${{ runner.os == 'Windows' && '.exe' || '' }} --help
          ./cxre${{ runner.os == 'Windows' && '.exe' || '' }} --version

  snapshot:
    name: Release snapshot
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install Syft
        run: go install github.com/anchore/syft/cmd/syft@v1.44.0
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cxre-snapshot
          path: dist/
          if-no-files-found: error
          retention-days: 7

  required:
    name: CI required
    if: always()
    needs:
      - quality
      - minimum-go
      - race
      - vulnerabilities
      - smoke
      - snapshot
    runs-on: ubuntu-24.04
    steps:
      - name: Require every CI job
        shell: bash
        run: |
          test '${{ needs.quality.result }}' = success
          test '${{ needs.minimum-go.result }}' = success
          test '${{ needs.race.result }}' = success
          test '${{ needs.vulnerabilities.result }}' = success
          test '${{ needs.smoke.result }}' = success
          test '${{ needs.snapshot.result }}' = success
