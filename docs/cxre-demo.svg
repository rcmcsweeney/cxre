<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">CXRE terminal output</title>
  <desc id="desc">A fictional example showing three Codex reset credits ordered by expiration time.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#07111f" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1520"/>
      <stop offset="1" stop-color="#101924"/>
    </linearGradient>
  </defs>

  <rect width="1120" height="560" rx="30" fill="#eef4f8"/>
  <g filter="url(#shadow)">
    <rect x="48" y="42" width="1024" height="468" rx="18" fill="url(#terminal)" stroke="#243244" stroke-width="2"/>
  </g>

  <path d="M48 100h1024" stroke="#243244" stroke-width="2"/>
  <circle cx="82" cy="71" r="8" fill="#ff6b65"/>
  <circle cx="108" cy="71" r="8" fill="#f2bd4a"/>
  <circle cx="134" cy="71" r="8" fill="#4bc784"/>
  <text x="560" y="78" text-anchor="middle" fill="#8391a2" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">cxre</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="88" y="148" fill="#63d7e2" font-size="24" font-weight="700">CXRE</text>
    <text x="158" y="148" fill="#f0f5fa" font-size="24" font-weight="600">— Codex Reset Expirations</text>

    <text x="88" y="200" fill="#a9b5c3" font-size="20">Available reset credits:</text>
    <text x="392" y="200" fill="#f0f5fa" font-size="20" font-weight="700">3</text>

    <text x="88" y="255" fill="#8291a3" font-size="17" font-weight="700" letter-spacing="0.7">EXPIRES</text>
    <text x="752" y="255" fill="#8291a3" font-size="17" font-weight="700" letter-spacing="0.7">REMAINING</text>
    <path d="M88 273h944" stroke="#2d3b4d" stroke-width="2"/>

    <text x="88" y="316" fill="#f0f5fa" font-size="20">Sun 12 Jul 2026 8:42:17 PM NZST</text>
    <rect x="742" y="289" width="126" height="39" rx="9" fill="#3b3219" stroke="#665626"/>
    <text x="805" y="315" text-anchor="middle" fill="#f2c94c" font-size="19" font-weight="700">4h 12m</text>

    <text x="88" y="375" fill="#f0f5fa" font-size="20">Mon 20 Jul 2026 9:00:00 AM NZST</text>
    <rect x="742" y="348" width="146" height="39" rx="9" fill="#172c31" stroke="#27515a"/>
    <text x="815" y="374" text-anchor="middle" fill="#72d9e1" font-size="19" font-weight="700">7d 16h</text>

    <text x="88" y="434" fill="#f0f5fa" font-size="20">Sun 02 Aug 2026 4:03:51 PM NZST</text>
    <rect x="742" y="407" width="158" height="39" rx="9" fill="#172c31" stroke="#27515a"/>
    <text x="821" y="433" text-anchor="middle" fill="#72d9e1" font-size="19" font-weight="700">21d 23h</text>

    <text x="88" y="480" fill="#657588" font-size="15">Fictional example • Pacific/Auckland</text>
  </g>
</svg>
